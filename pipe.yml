pipe:
  sleeptime: 1800
  agent:
    timeout: 1200
  github:
    throttle: 2        # intervalo base entre chamadas API (segundos)
    max-throttle: 30   # intervalo máximo no backoff exponencial (segundos)
    retry-after: 60    # fallback de espera quando secondary rate limit sem header
    cooldown: 600      # segundos sem throttle antes de regredir um nível
    penalty:
      base: 3600       # duração base do penalty box (segundos) — 1h
      max: 86400       # duração máxima do penalty box (segundos) — 24h
      cooldown: 3600   # segundos sem penalidade antes de regredir um nível — 1h
  log:
    ttl: 10
    level: INFO

effort:
  low:
    model: claude-haiku-4.5
    effort: low
  medium:
    model: claude-sonnet-4
    effort: medium
  high:
    model: claude-sonnet-4
    effort: high

doc: docs/

git:
  repo: "brenodpm/esteira-agentica"
  flow:
    base: main
    cleanup: true

    hotfix:
      prefix: hotfix
      description: "Usada para correção de bugs em produção"
      create: main
      merge: main

    epic:
      prefix: epic
      description: "Branch para épicos — planejamento e documentação"
      create: main
      merge: main
    feature:
      prefix: feature
      description: "Branch de feature de desenvolvimento"
      create: epic
      merge: epic
    bugfix:
      prefix: fix
      description: "Usada para correção de bugs em homologação"
      create: epic
      merge: epic

boards:
  bugs: bug
  needs: debito
  alter-remote-boards: true
  allow-del-remote-issue: true

  # ──────────────────────────────────────────────
  # EPIC — ciclo completo de um épico
  # ──────────────────────────────────────────────
  epic:
    name: "Pipe - Epics"
    todo: backlog
    priority: 4
    flow: epic
    parallel: false
    columns:
      backlog:
        name: Backlog
        desc: "Humano criou o épico"
        change:
          advance: analise-negocio
          cancelar: cancelado
      analise-negocio:
        name: "Análise de Negócio"
        desc: "Agente de negócio entende o épico e cria documentações negociais"
        agent: product
        effort: high
        gitevents: [create]
        acao: "Entender a demanda, entrevistar o usuário (via write e history), criar ou alterar as documentações. Atenção, não crie issues em nenhum board nesta etapa!"
        change:
          advance: aprovacao-negocio
      aprovacao-negocio:
        name: "Aprovação Negócio"
        desc: "Humano aprova os artefatos negociais"
      criacao-stories:
        name: "Criação de User Stories"
        desc: "Agente de negócio cria as user stories do épico"
        agent: product
        acao: "Ler todas as documentações, criar as respectivas user stories no board e bloquear este epico com o id das uses histories criadas"
        change:
          advance: aguardando-stories
      aguardando-stories:
        name: "Aguardando Stories"
        desc: "Aguarda a conclusão de todas as user stories vinculadas"
        change:
          advance: pre-prod
      pre-prod:
        name: "Pré produção"
        desc: "Agente de Tech Lead prepara ambiente pré produtivo para homologação"
        agent: tech-lead
        acao: "# Execução pré produção\nPreparar o ambiente pré produtivo para o humano homologar, faça:\n- Mergear a branch main na branch do epico;\n- Resolver os conflitos;\n- Validar se todas as mudanças estão presentes e integras;\n- Preparar o ambiente pré-produtivo (docker compose) para homologação;\n- Escrever orientações detalhadas para como executar o ambiente pré produtivo;\n- avançar a issue para advance."
        change:
          advance: homologacao
      homologacao:
        name: "Homologação"
        desc: "Humano efetua homologação"
      documentacao:
        name: "Documentação"
        desc: "Agente de negócio cria ou atualiza documentações públicas, change files e README"
        agent: product
        effort: low
        acao: "Atualizar README, documentações públicas e change files, refletindo as mudanças entregues"
        change:
          advance: publicacao
      publicacao:
        name: "Publicação"
        desc: "Agente DevOps publica em produção"
        agent: devops
        acao: "Publicar em produção conforme runbook, atualizar variáveis e executar deploy"
        change:
          advance: otimizacao
      otimizacao:
        name: "Otimização"
        desc: "Agente especialista em IA analisa desempenho e melhora os agentes"
        agent: optimizer
        gitevents: [merge]
        acao: "# Orimização da automação de IA\n\nO objetivo desta etapa é analizar o desempenho de cada um dos agentes que atuaram no desenvolvimento deste epico e suas sub issues.\n\n## Plano de ação\n- Ler os logs das execuções relacionadas coma issue e as subissues;\n- Encontrar e ler os indicadores de execução dos agentes especificos;\n- Entender se o agente está sendo menos eficientes e ou mais caro (consumo de tokens) que o normal\n\n## Metricas\nTamanho do prompt\ntempo de execução\ntokens consumidos\nretrabalho (quantidade de vezes que um mesmo agente agiu sobre uma mesma tarefa)\n\n\n## Objetivo\nOtimizar prompts\notimizar descrição de agentes\nmelhorar as entregas\nreduzir o consumo de tokens\n\n## Fora de escopo\n- Você não deve alterar o código fonte (esta é uma tarefa da esteira como um todo)\n- Você não deve alterar o codigo fonte da esteira (se encontrar um comportamento estranho do codigo fonte da esteira, solicite que uma nova feature seja incluída na pipe da esteira)"
        change:
          advance: concluido
      concluido:
        name: "Concluído"
        desc: "Issue concluída"
        agent: generic
        acao: "# Issue concluída\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      cancelado:
        name: "Cancelado"
        desc: "Issue cancelada"
        agent: generic
        acao: "# Issue cancelada\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      encerrado:
        name: "Encerrado"

  # ──────────────────────────────────────────────
  # USER STORY — ciclo de uma user story
  # ──────────────────────────────────────────────
  story:
    name: "Pipe - User Stories"
    todo: backlog
    priority: 3
    flow: epic
    columns:
      backlog:
        name: Backlog
        desc: "Story aguardando início"
        change:
          advance: requisitos
          cancelar: cancelado
      requisitos:
        name: "Requisitos"
        desc: "Agente de requisitos levanta requisitos e complementa documentações"
        agent: requirements
        gitevents: [create]
        acao: "Entender o que foi solicitado; Entrevistar o usuario (via write e history) para fechar lacunas; quando não houver mais dúvidas criar ou alterar as documentações do ponto de vista negocial, sempre que terminar, mover a issue para advance"
        change:
          advance: validacao-negocial
      validacao-negocial:
        name: "Validação Negocial"
        desc: "Humano valida documentação de negócio"
      arquitetura:
        name: "Arquitetura"
        desc: "Agente de arquitetura define a arquitetura da story"
        agent: architecture
        effort: high
        acao: "Entender o que foi solicitado; Entrevistar o usuario (via write e history) para fechar lacunas; quando não houver mais dúvidas criar ou alterar as documentações arquiteturais"
        change:
          advance: validacao-arquitetura
      validacao-arquitetura:
        name: "Validação Arquitetural"
        desc: "Humano valida as documentações arquiteturais"
      planejamento-tecnico:
        name: "Planejamento Técnico"
        desc: "Agente líder técnico define as tarefas de desenvolvimento"
        agent: tech-lead
        acao: "Decompor a story em tarefas técnicas rastreáveis e criar as issues de task no board"
        change:
          advance: aguardando-tasks
      aguardando-tasks:
        name: "Aguardando Tasks"
        desc: "Aguarda a conclusão de todas as tasks vinculadas"
        change:
          advance: change-file
      change-file:
        name: "Change File"
        desc: "Agente líder técnico cria o change file da story"
        agent: tech-lead
        effort: low
        gitevents: [merge]
        acao: "Criar change file documentando todas as alterações entregues na story, verificar se todos os bloqueios do Epico foram concluídos, se sim mova o epico para a advance"
        change:
          advance: concluido
      concluido:
        name: "Concluído"
        desc: "Issue concluída"
        agent: generic
        acao: "# Issue concluída\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      cancelado:
        name: "Cancelado"
        desc: "Issue cancelada"
        agent: generic
        acao: "# Issue cancelada\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      encerrado:
        name: "Encerrado"

  # ──────────────────────────────────────────────
  # TASK — ciclo de uma tarefa de desenvolvimento
  # ──────────────────────────────────────────────
  task:
    name: "Pipe - Tasks"
    todo: backlog
    priority: 2
    flow: feature
    columns:
      backlog:
        name: Backlog
        desc: "Task aguardando início"
        change:
          advance: planning-poker
          cancelar: cancelado
      planning-poker:
        name: "Planning Poker"
        desc: "Agente Tech Lead estima a complexidade"
        agent: tech-lead
        acao: "Avaliar a complexidade da tarefa e de acordo com a tarefa adicionar a tag `/effort low | medium | high` (escolher apenas um nivel) e mover a tarefa para advance.\n\nAtenção esta tarefa não necessita de branch uma vez que apenas altera a issue"
        change:
          advance: casos-de-teste
      casos-de-teste:
        name: "Casos de Teste"
        desc: "Agente de qualidade escreve os casos de teste"
        agent: quality
        gitevents: [create]
        acao: "Escrever casos de teste baseados nos critérios de aceitação da task! não altere código; não execute teste"
        change:
          advance: desenvolvimento
      desenvolvimento:
        name: "Desenvolvimento"
        desc: "Agente de engenharia cria código e cobertura de testes (TDD)"
        agent: engineering
        effort: high
        acao: "Implementar a task seguindo TDD, garantindo cobertura dos casos de teste definidos; Quando concluído, fazer merge request com a branch de story original"
        gitevents: [merge]
        change:
          advance: code-review
      code-review:
        name: "Code Review"
        desc: "Humano faz code review do PR"
      execucao-testes:
        name: "Execução de Testes"
        desc: "Agente de qualidade executa os casos de teste"
        agent: quality
        acao: "Executar casos de teste, registrar resultados e reportar falhas. Não altera código; não cria nem altera caso de teste"
        change:
          advance: concluido
          falha: desenvolvimento
      concluido:
        name: "Concluído"
        desc: "Issue concluída"
        agent: generic
        acao: "# Issue concluída\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      cancelado:
        name: "Cancelado"
        desc: "Issue cancelada"
        agent: generic
        acao: "# Issue cancelada\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      encerrado:
        name: "Encerrado"

  # ──────────────────────────────────────────────
  # BUG — correção de bug
  # ──────────────────────────────────────────────
  bug:
    name: "Pipe - Bugs"
    todo: backlog
    priority: 0
    flow: bugfix
    columns:
      backlog:
        name: Backlog
        desc: "Bug reportado aguardando correção"
        change:
          advance: correcao
          cancelar: cancelado
      correcao:
        name: "Correção"
        desc: "Agente de engenharia corrige o problema"
        agent: engineering
        gitevents: [create]
        acao: "Corrigir o bug reportado, garantindo que os testes existentes continuem passando"
        change:
          advance: reteste
      reteste:
        name: "Reteste"
        desc: "Agente de qualidade refaz os testes"
        agent: quality
        gitevents: [merge]
        acao: "Reexecutar casos de teste e validar que o bug foi corrigido sem regressão"
        change:
          advance: concluido
          falha: correcao
      concluido:
        name: "Concluído"
        desc: "Issue concluída"
        agent: generic
        acao: "# Issue concluída\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      cancelado:
        name: "Cancelado"
        desc: "Issue cancelada"
        agent: generic
        acao: "# Issue cancelada\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      encerrado:
        name: "Encerrado"

  # ──────────────────────────────────────────────
  # DÉBITO — sanação de débito técnico e ou negocial
  # ──────────────────────────────────────────────
  debito:
    name: "Pipe - Débitos"
    priority: 1
    flow: bugfix
    todo: humano
    columns:
      humano:
        name: "Humano"
        desc: "Débito abeto para o humano"
      product:
        name: "Agente product"
        desc: "Débito abeto para o agente product"
        agent: product
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write"
        change:
          advance: ux
          concluido: concluido
          cancelar: cancelado
      ux:
        name: "Agente UX"
        desc: "Débito abeto para o agente ux"
        agent: ux
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write"
        change:
          advance: requirements
          concluido: concluido
          cancelar: cancelado
      requirements:
        name: "Agente requirements"
        desc: "Débito abeto para o agente requirements"
        agent: requirements
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write"
        change:
          advance: architecture
          concluido: concluido
          cancelar: cancelado
      architecture:
        name: "Agente architecture"
        desc: "Débito abeto para o agente architecture"
        agent: architecture
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write"
        change:
          advance: engineering
          concluido: concluido
          cancelar: cancelado
      engineering:
        name: "Agente engineering"
        desc: "Débito abeto para o agente engineering"
        agent: engineering
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write"
        change:
          advance: quality
          concluido: concluido
          cancelar: cancelado
      quality:
        name: "Agente quality"
        desc: "Débito abeto para o agente quality"
        agent: quality
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write"
        change:
          advance: concluido
          cancelar: cancelado
      concluido:
        name: "Concluído"
        desc: "Issue concluída"
        agent: generic
        acao: "# Issue concluída\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      cancelado:
        name: "Cancelado"
        desc: "Issue cancelada"
        agent: generic
        acao: "# Issue cancelada\n\n- Vasculhe todas as issues procurando /blocked_by com o numero e ou nome desta issue e remova a tag;\n- Comente na issue desbloqueada, qual issue removeu o bloqueio;\n-Ao concluir avance esta issue para advance"
        change:
          advance: encerrado
      encerrado:
        name: "Encerrado"

  # ──────────────────────────────────────────────
  # INCIDENTE - Esteira de problemas em produção
  # ──────────────────────────────────────────────
  incidente:
    name: "Pipe - Incidente"
    priority: 0
    flow: hotfix
    todo: reportado
    columns:
      reportado:
        name: "Reportado"
        desc: "Problema reportado"
        change:
          advance: triagem
      registro:
        name: "Agente product faz o registro do incidente"
        desc: "Registro do Incidente"
        agent: product
        gitevents: [create]
        acao: "# Documentar incidente\n\n-Criar o registro do incidente segundo `.kiro/artifacts/incidente.md`\n- Adicionar o arquivo de incidente no body da issue;\n- Colher dados com o usuário;\n\n# Após a conclusão:\n- Preencher APENAS o capitulo 'Registro' do arquivo do incidente;\n- Avançar issue para advance."
        change:
          advance: triagem
          cancelar: cancelado
      triagem:
        name: "Triagem"
        desc: "Agente Tech Lead faz a triagem do incidente"
        agent: tech-lead
        acao: "- Confirmar se o problema existe;\n- Verificar se é bug, configuração, operação ou uso incorreto;\n- Avaliar impacto;\n- Classificar severidade;\n# Perguntas típicas:\n\n- Quantos usuários foram afetados?\n- Existe perda financeira?\n- Existe alternativa (workaround)?\n\n# Após a conclusão:\n- Preencher APENAS o capitulo 'Triagem' do arquivo do incidente;\n- Avançar issue para advance."
        change:
          advance: analise-tecnica
          cancelar: cancelado
      analise-tecnica:
        name: "Análise Técnica"
        desc: "Agente engineering faz análise técnica do incidente"
        agent: engineering
        effort: high
        acao: "Investigar:\n\n- Logs\n- Métricas\n- Traces\n- Histórico de deploys\n- Mudanças recentes\n\nO objetivo é responder:\n\n- Qual a causa?\n- Qual o risco?\n- Existe workaround?\n- Quanto custa corrigir?\n\n# Após a conclusão:\n- Preencher capitulo 'Análise técnica' do arquivo do incidente;\n- Avançar issue para advance."
        change:
          advance: decisao-tratamento
      decisao-tratamento:
        name: "Decisão de tratamento"
        desc: "Agente líder técnico define as tarefas de desenvolvimento"
        agent: tech-lead
        effort: high
        acao: "# Decisão de tratamento\n\n> Importante: esta etapa não executa a decisão, apenas define, outra coluna terá a responsalibidade de executar tudo que esta aqui decidir.\n\nA partir das análises anteriores, decidir se o caminho a ser tomado será:\n\n- Opção 1: Entender que ser trata de um problema grave e devemos continuar a tratá-lo como um incidente produtivo. Neste caso continuaremos tratando ele pelo board de incidente e a issue deverá seguir o fluxo;\n- Opção 2: Entender que se trata de um problema intermediário ou leve e para solucioná-lo é necessário apenas uma task de correção. Neste caso criaremos uma issue de correção no board 'Task' e neste caso o trabalho da issue estará concluído;\n- Opção 3: Entender que se trata de uma nova funcionalidade e não um problema não tratado: Neste caso criaremos uma issue no board Epic e neste caso o trabalho da issue estará concluído;\n- Opção 4: Entender que não há nada a ser feito e neste caso o trabalho da issue estará cancelado.\n\n# Conclusão\n\n- Após a tomada de decisão, a escolha deverá ser registrada em detalhes no capitulo 'Ação proposta' do arquivo do incidente. Caso a escolha envolva criar outras issues, para cada nova issue:\n    - infome o board, o nome e o conteúdo da issues com a riquisa de detalhes que o template referente a ele em `escrevas/.kiro/artifacts/` exige.\n- Avançar a issue atual para advance."
        change:
          advance: analise-relatorio
      analise-relatorio:
        name: "Análise do relatório"
        desc: "Humano faz análise do que foi levantado sobre o incidente"
      execucao-tratamento:
        name: "Execução de tratamento"
        desc: "Agente operacional executa a decisão de tratameno"
        agent: generic
        effort: low
        acao: "Executar exatamente o que está em `Ação proposta` na documentação do incidente.\nNão interprete, não analise, não crie propostas alternativas.\nSe algum comando gerar qualquer dúvida escreva sua duvida no comentário e avance para impedimento.\n\nCaso não tenha nenhuma dúvida, execute exatamente como está descrito e avance para onde foi determinado"
        change:
          advance: planejamento-tecnico
          concluido: concluido
          cancelado: cancelado
          impedimento: decisao-tratamento
      planejamento-tecnico:
        name: "Planejamento Técnico"
        desc: "Agente líder técnico define as tarefas de correção do incidente"
        agent: tech-lead
        effort: high
