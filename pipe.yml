pipe:
  agent:
    timeout: 1800
    sleeptime: 30

doc: docs/

git:
  repo: "brenodpm/esteira-agentica"
  flow:
    base: main
    cleanup: true  # após cada etapa, checkout para base e apaga branches locais

    # create/merge: se é uma branch fixa (main, develop), faz fetch+pull antes de usar.
    # Se aponta para um prefixo de outro flow (ex: "release"), a branch exata deve ser
    # informada na issue via label "branch:<nome>" ou no body "<!-- branch: release/v1.0 -->".

    release:
      prefix: release
      description: "Branch de release do projeto"
      create: main       # branch fixa
      merge: main        # branch fixa
    feature:
      prefix: feature
      description: "Branch de feature de desenvolvimento"
      create: main       # branch fixa
      merge: release     # prefixo → resolver via issue
    epic:
      prefix: epic
      description: "Branch para épicos — planejamento e documentação"
      create: main       # branch fixa
      merge: release     # prefixo → resolver via issue
    hotfix:
      prefix: hotfix
      description: "Usada para correção de bugs em produção"
      create: main       # branch fixa
      merge: main        # branch fixa
    bugfix:
      prefix: fix
      description: "Usada para correção de bugs em homologação"
      create: release    # prefixo → resolver via issue
      merge: release     # prefixo → resolver via issue

boards:
  bugs: bug
  needs: debito

  # ──────────────────────────────────────────────
  # EPIC — ciclo completo de um épico
  # Prioridade 0: board principal
  # ──────────────────────────────────────────────
  epic:
    name: "Epics"
    todo: backlog
    priority: 4
    flow: epic
    parallel: false
    columns:
      backlog:
        name: Backlog
        desc: "Humano criou o épico"
        change:
          advance: analise-negocio
          cancelar: cancelado
      analise-negocio:
        name: "Análise de Negócio"
        desc: "Agente de negócio entende o épico e cria documentações negociais"
        agent: product
        effort: high
        gitevents: [create]
        acao: "Entender o épico, produzir visão de produto, problem-space e épicos"
        change:
          advance: aprovacao-negocio
      aprovacao-negocio:
        name: "Aprovação Negócio"
        desc: "Humano aprova os artefatos negociais"
        change:
          advance: criacao-stories
          reprovar: analise-negocio
      criacao-stories:
        name: "Criação de User Stories"
        desc: "Agente de negócio cria as user stories do épico"
        agent: product
        acao: "Criar user stories detalhadas com critérios de aceitação para o épico aprovado"
        change:
          advance: aguardando-stories
      aguardando-stories:
        name: "Aguardando Stories"
        desc: "Aguarda a conclusão de todas as user stories vinculadas"
        change:
          advance: homologacao
      homologacao:
        name: "Homologação"
        desc: "Humano efetua homologação"
        change:
          advance: publicacao
          reprovar: aguardando-stories
      publicacao:
        name: "Publicação"
        desc: "Agente DevOps publica em produção"
        agent: devops
        acao: "Publicar em produção conforme runbook, atualizar variáveis e executar deploy"
        change:
          advance: documentacao
      documentacao:
        name: "Documentação"
        desc: "Agente de negócio cria ou atualiza documentação pública e README"
        agent: product
        effort: low
        acao: "Atualizar README e documentação pública refletindo as mudanças entregues"
        change:
          advance: otimizacao
      otimizacao:
        name: "Otimização"
        desc: "Agente especialista em IA analisa desempenho e melhora os agentes"
        agent: optimizer
        gitevents: [merge]
        acao: "Analisar métricas e logs do épico, aplicar melhorias nos agentes para aumentar desempenho e reduzir custos"
        change:
          advance: concluido
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # USER STORY — ciclo de uma user story
  # Prioridade 1: iniciado após demandas
  # ──────────────────────────────────────────────
  story:
    name: "User Stories"
    todo: backlog
    priority: 3
    flow: epic
    columns:
      backlog:
        name: Backlog
        desc: "Story aguardando início"
        change:
          advance: requisitos
          cancelar: cancelado
      requisitos:
        name: "Requisitos"
        desc: "Agente de requisitos levanta requisitos e complementa documentações"
        agent: requirements
        gitevents: [create]
        acao: "Levantar requisitos funcionais e não-funcionais, complementar documentações negociais com critérios técnicos"
        change:
          advance: arquitetura
      arquitetura:
        name: "Arquitetura"
        desc: "Agente de arquitetura define a arquitetura da story"
        agent: architecture
        effort: high
        acao: "Definir arquitetura técnica, ADRs e constraints para a story"
        change:
          advance: validacao-artefatos
      validacao-artefatos:
        name: "Validação de Artefatos"
        desc: "Humano valida os artefatos de requisitos e arquitetura"
        change:
          advance: planejamento-tecnico
          reprovar: requisitos
      planejamento-tecnico:
        name: "Planejamento Técnico"
        desc: "Agente líder técnico define as tarefas de desenvolvimento"
        agent: tech-lead
        acao: "Decompor a story em tarefas técnicas rastreáveis e criar as issues de task no board"
        change:
          advance: aguardando-tasks
      aguardando-tasks:
        name: "Aguardando Tasks"
        desc: "Aguarda a conclusão de todas as tasks vinculadas"
        change:
          advance: change-file
      change-file:
        name: "Change File"
        desc: "Agente líder técnico cria o change file da story"
        agent: tech-lead
        effort: low
        gitevents: [merge]
        acao: "Criar change file documentando todas as alterações entregues na story"
        change:
          advance: concluido
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # TASK — ciclo de uma tarefa de desenvolvimento
  # Prioridade 2
  # ──────────────────────────────────────────────
  task:
    name: "Tasks"
    todo: backlog
    priority: 1
    flow: feature
    columns:
      backlog:
        name: Backlog
        desc: "Task aguardando início"
        change:
          advance: casos-de-teste
          cancelar: cancelado
      casos-de-teste:
        name: "Casos de Teste"
        desc: "Agente de qualidade escreve os casos de teste"
        agent: quality
        gitevents: [create]
        acao: "Escrever casos de teste baseados nos critérios de aceitação da task"
        change:
          advance: desenvolvimento
      desenvolvimento:
        name: "Desenvolvimento"
        desc: "Agente de engenharia cria código e cobertura de testes (TDD)"
        agent: engineering
        effort: high
        acao: "Implementar a task seguindo TDD, garantindo cobertura dos casos de teste definidos"
        change:
          advance: execucao-testes
          bloquear: bloqueado
      execucao-testes:
        name: "Execução de Testes"
        desc: "Agente de qualidade executa os casos de teste"
        agent: quality
        gitevents: [merge]
        acao: "Executar casos de teste, registrar resultados e reportar falhas"
        change:
          advance: code-review
          falha: desenvolvimento
      code-review:
        name: "Code Review"
        desc: "Humano faz code review do PR"
        change:
          advance: concluido
          reprovar: desenvolvimento
      bloqueado:
        name: "Bloqueado"
        desc: "Task bloqueada por dependência"
        change:
          advance: desenvolvimento
          cancelar: cancelado
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # BUG — correção de bug
  # Prioridade 2 (mesmo nível que tasks)
  # ──────────────────────────────────────────────
  bug:
    name: "Bugs"
    todo: backlog
    priority: 0
    flow: bugfix
    columns:
      backlog:
        name: Backlog
        desc: "Bug reportado aguardando correção"
        change:
          advance: correcao
          cancelar: cancelado
      correcao:
        name: "Correção"
        desc: "Agente de engenharia corrige o problema"
        agent: engineering
        gitevents: [create]
        acao: "Corrigir o bug reportado, garantindo que os testes existentes continuem passando"
        change:
          advance: reteste
      reteste:
        name: "Reteste"
        desc: "Agente de qualidade refaz os testes"
        agent: quality
        gitevents: [merge]
        acao: "Reexecutar casos de teste e validar que o bug foi corrigido sem regressão"
        change:
          advance: concluido
          falha: correcao
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # DÉBITO — sanação de débito técnico ou negocial
  # Prioridade 2 (mesmo nível que tasks)
  # ──────────────────────────────────────────────
  debito:
    name: "Débitos"
    todo: backlog
    priority: 2
    flow: bugfix
    columns:
      backlog:
        name: Backlog
        desc: "Débito registrado aguardando resolução"
        change:
          advance: resolucao
          cancelar: cancelado
      resolucao:
        name: "Resolução"
        desc: "Agente ou humano sana o débito"
        agent: engineering
        gitevents: [create, merge]
        acao: "Sanar o débito técnico ou negocial conforme descrito, documentando a solução"
        change:
          advance: concluido
          cancelar: cancelado
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"
