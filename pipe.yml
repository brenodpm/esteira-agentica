pipe:
  agent:
    timeout: 1200
    sleeptime: 1800

ttl-log: 10

effort:
  low:
    model: claude-haiku-4.5
    effort: low
  medium:
    model: claude-sonnet-4
    effort: medium
  high:
    model: claude-sonnet-4
    effort: high

doc: docs/

git:
  repo: "brenodpm/esteira-agentica"
  flow:
    base: main
    cleanup: true  # após cada etapa, checkout para base e apaga branches locais

    # create/merge: se é uma branch fixa (main, develop), faz fetch+pull antes de usar.
    # Se aponta para um prefixo de outro flow (ex: "release"), a branch exata deve ser
    # informada na issue via label "branch:<nome>" ou no body "<!-- branch: release/v1.0 -->".

    hotfix:
      prefix: hotfix
      description: "Usada para correção de bugs em produção"
      create: main       # branch fixa
      merge: main        # branch fixa

    release:
      prefix: release
      description: "Branch de release do projeto"
      create: main       # branch fixa
      merge: main        # branch fixa

    epic:
      prefix: epic
      description: "Branch para épicos — planejamento e documentação"
      create: main       # branch fixa
      merge: release     # prefixo → resolver via issue
    feature:
      prefix: feature
      description: "Branch de feature de desenvolvimento"
      create: epic       # branch fixa
      merge: epic     # prefixo → resolver via issue
    bugfix:
      prefix: fix
      description: "Usada para correção de bugs em homologação"
      create: epic    # prefixo → resolver via issue
      merge: epic     # prefixo → resolver via issue

boards:
  bugs: bug
  needs: debito

  # ──────────────────────────────────────────────
  # EPIC — ciclo completo de um épico
  # Prioridade 0: board principal
  # ──────────────────────────────────────────────
  epic:
    name: "Epics"
    todo: backlog
    priority: 4
    flow: epic
    parallel: false
    columns:
      backlog:
        name: Backlog
        desc: "Humano criou o épico"
        change:
          advance: analise-negocio
          cancelar: cancelado
      analise-negocio:
        name: "Análise de Negócio"
        desc: "Agente de negócio entende o épico e cria documentações negociais"
        agent: product
        effort: high
        gitevents: [create]
        acao: "Entender a demanda, entrevistar o usuário (via write e history), criar ou alterar as documentações. Atenção, não crie issues em nenhum board nesta etapa!"
        change:
          advance: aprovacao-negocio
      aprovacao-negocio:
        name: "Aprovação Negócio"
        desc: "Humano aprova os artefatos negociais"
      criacao-stories:
        name: "Criação de User Stories"
        desc: "Agente de negócio cria as user stories do épico"
        agent: product
        acao: "Ler todas as documentações, criar as respectivas user stories no board e bloquear este epico com o id das uses histories criadas"
        change:
          advance: aguardando-stories
      aguardando-stories:
        name: "Aguardando Stories"
        desc: "Aguarda a conclusão de todas as user stories vinculadas"
        change:
          advance: release
      release:
        name: "Criação de User Stories"
        desc: "Agente de negócio cria as user stories do épico"
        agent: product
        acao: "Ler todas as documentações, criar as respectivas user stories no board e bloquear este epico com o id das uses histories criadas"
        change:
          advance: aguardando-stories        
      homologacao:
        name: "Homologação"
        desc: "Humano efetua homologação"
      publicacao:
        name: "Publicação"
        desc: "Agente DevOps publica em produção"
        agent: devops
        acao: "Publicar em produção conforme runbook, atualizar variáveis e executar deploy"
        change:
          advance: documentacao
      documentacao:
        name: "Documentação"
        desc: "Agente de negócio cria ou atualiza documentação pública e README"
        agent: product
        effort: low
        acao: "Atualizar README e documentação pública refletindo as mudanças entregues"
        change:
          advance: otimizacao
      otimizacao:
        name: "Otimização"
        desc: "Agente especialista em IA analisa desempenho e melhora os agentes"
        agent: optimizer
        gitevents: [merge]
        acao: "Analisar métricas e logs do épico, aplicar melhorias nos agentes para aumentar desempenho e reduzir custos"
        change:
          advance: concluido
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # USER STORY — ciclo de uma user story
  # Prioridade 1: iniciado após demandas
  # ──────────────────────────────────────────────
  story:
    name: "User Stories"
    todo: backlog
    priority: 3
    flow: epic
    columns:
      backlog:
        name: Backlog
        desc: "Story aguardando início"
        change:
          advance: requisitos
          cancelar: cancelado
      requisitos:
        name: "Requisitos"
        desc: "Agente de requisitos levanta requisitos e complementa documentações"
        agent: requirements
        gitevents: [create]
        acao: "Entender o que foi solicitado; Entrevistar o usuario (via write e history) para fechar lacunas; quando não houver mais dúvidas criar ou alterar as documentações do ponto de vista negocial"
        change:
          advance: validacao-negocial
      validacao-negocial:
        name: "Validação de Artefatos"
        desc: "Humano valida documentação de negócio"
      arquitetura:
        name: "Arquitetura"
        desc: "Agente de arquitetura define a arquitetura da story"
        agent: architecture
        effort: high
        acao: "Entender o que foi solicitado; Entrevistar o usuario (via write e history) para fechar lacunas; quando não houver mais dúvidas criar ou alterar as documentações arquiteturais"
        change:
          advance: validacao-arquitetura
      validacao-arquitetura:
        name: "Validação de Artefatos"
        desc: "Humano valida as documentações arquiteturais"
      planejamento-tecnico:
        name: "Planejamento Técnico"
        desc: "Agente líder técnico define as tarefas de desenvolvimento"
        agent: tech-lead
        acao: "Decompor a story em tarefas técnicas rastreáveis e criar as issues de task no board"
        change:
          advance: aguardando-tasks
      aguardando-tasks:
        name: "Aguardando Tasks"
        desc: "Aguarda a conclusão de todas as tasks vinculadas"
        change:
          advance: change-file
      change-file:
        name: "Change File"
        desc: "Agente líder técnico cria o change file da story"
        agent: tech-lead
        effort: low
        gitevents: [merge]
        acao: "Criar change file documentando todas as alterações entregues na story, verificar se todos os bloqueios do Epico foram concluídos, se sim mova o epico para a release"
        change:
          advance: concluido
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # TASK — ciclo de uma tarefa de desenvolvimento
  # Prioridade 2
  # ──────────────────────────────────────────────
  task:
    name: "Tasks"
    todo: backlog
    priority: 2
    flow: feature
    columns:
      backlog:
        name: Backlog
        desc: "Task aguardando início"
        change:
          advance: casos-de-teste
          cancelar: cancelado
      casos-de-teste:
        name: "Casos de Teste"
        desc: "Agente de qualidade escreve os casos de teste"
        agent: quality
        gitevents: [create]
        acao: "Escrever casos de teste baseados nos critérios de aceitação da task! não altere código; não execute teste"
        change:
          advance: desenvolvimento
      desenvolvimento:
        name: "Desenvolvimento"
        desc: "Agente de engenharia cria código e cobertura de testes (TDD)"
        agent: engineering
        effort: high
        acao: "Implementar a task seguindo TDD, garantindo cobertura dos casos de teste definidos; Quando concluído, fazer merge request com a branch de story original"
        gitevents: [merge]
        change:
          advance: code-review
      code-review:
        name: "Code Review"
        desc: "Humano faz code review do PR"
      execucao-testes:
        name: "Execução de Testes"
        desc: "Agente de qualidade executa os casos de teste"
        agent: quality
        acao: "Executar casos de teste, registrar resultados e reportar falhas. Não altera código; não cria nem altera caso de teste"
        change:
          advance: concluido
          falha: desenvolvimento
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # BUG — correção de bug
  # ──────────────────────────────────────────────
  bug:
    name: "Bugs"
    todo: backlog
    priority: 0
    flow: bugfix
    columns:
      backlog:
        name: Backlog
        desc: "Bug reportado aguardando correção"
        change:
          advance: correcao
          cancelar: cancelado
      correcao:
        name: "Correção"
        desc: "Agente de engenharia corrige o problema"
        agent: engineering
        gitevents: [create]
        acao: "Corrigir o bug reportado, garantindo que os testes existentes continuem passando"
        change:
          advance: reteste
      reteste:
        name: "Reteste"
        desc: "Agente de qualidade refaz os testes"
        agent: quality
        gitevents: [merge]
        acao: "Reexecutar casos de teste e validar que o bug foi corrigido sem regressão"
        change:
          advance: concluido
          falha: correcao
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"

  # ──────────────────────────────────────────────
  # DÉBITO — sanação de débito técnico e ou negocial
  # ──────────────────────────────────────────────
  debito:
    name: "Débitos"
    priority: 1
    flow: bugfix
    columns:
      humano:
        name: "Humano"
        desc: "Débito abeto para o humano"
      product:
        name: "Agente product"
        desc: "Débito abeto para o agente product"
        agent: product
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write";
        change:
          advance: requirements
          concluido: concluido
          cancelar: cancelado
      requirements:
        name: "Agente requirements"
        desc: "Débito abeto para o agente requirements"
        agent: requirements
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write";
        change:
          advance: architecture
          concluido: concluido
          cancelar: cancelado
      architecture:
        name: "Agente architecture"
        desc: "Débito abeto para o agente architecture"
        agent: architecture
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write";
        change:
          advance: engineering
          concluido: concluido
          cancelar: cancelado
      engineering:
        name: "Agente engineering"
        desc: "Débito abeto para o agente engineering"
        agent: engineering
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write";
        change:
          advance: quality
          concluido: concluido
          cancelar: cancelado
      quality:
        name: "Agente quality"
        desc: "Débito abeto para o agente quality"
        agent: quality
        gitevents: [create, merge]
        acao: "Se debito aberto para seu nome: analisar solicitação e se pertinente, atualizar apenas documentações;\n Se debito aberto para agente anterior a você: verificar mudanças realizadas e atualizar as de sua responsabilidades; se debito foi aberto por você: verificar se todos os debitos foram sanados, se sim desbloquear tarefa original e concluir esta, se não, atualizar debito e devolver ao agente necessário\n\n TODOS: sempre anotar o que foi modificado em write";
        change:
          advance: concluido
          cancelar: cancelado
      concluido:
        name: "Concluído"
      cancelado:
        name: "Cancelado"
