log:
  dir: logs
  ttl: 10
  level: INFO

git:
  repo:
    main: git@github.com:brenodpm/esteira-agentica.git
  flow:
    base: main
    hotfix:
      prefix: hotfix/
      description: Correção de bugs em produção
      create: main
      merge: main
    epic:
      prefix: epic/
      description: Branch para épicos — planejamento e documentação
      create: main
      merge: main
    feature:
      prefix: feature/
      description: Branch de feature de desenvolvimento
      create: epic
      merge: epic
    bugfix:
      prefix: fix/
      description: Correção de bugs em homologação
      create: epic
      merge: epic

agents:
  kiro-cli:
    product:
      name: product
      model: claude-sonnet-4-20250514
    requirements:
      name: requirements
      model: claude-sonnet-4-20250514
    architecture:
      name: architecture
      model: claude-sonnet-4-20250514
    tech-lead:
      name: tech-lead
      model: claude-sonnet-4-20250514
    engineering:
      name: engineering
      model: claude-sonnet-4-20250514
    quality:
      name: quality
      model: claude-sonnet-4-20250514
    devops:
      name: devops
      model: claude-sonnet-4-20250514
    optimizer:
      name: optimizer
      model: claude-sonnet-4-20250514
    generic:
      name: generic
      model: claude-sonnet-4-20250514

boards:
  platform: github

  epic:
    name: Pipe - Epics
    todo: backlog
    priority: 4
    flow: epic
    parallel: false
    columns:
      backlog:
        name: Backlog
        change:
          advance: analise-negocio
          cancelar: cancelado
      analise-negocio:
        name: Análise de Negócio
        agent: product
        effort: high
        gitevents: [create]
        prompt: Entender a demanda, entrevistar o usuário (via write e history), criar ou alterar as documentações
        change:
          advance: aprovacao-negocio
      aprovacao-negocio:
        name: Aprovação Negócio
      criacao-stories:
        name: Criação de User Stories
        agent: product
        prompt: Ler todas as documentações, criar as respectivas user stories no board
        change:
          advance: aguardando-stories
      aguardando-stories:
        name: Aguardando Stories
        change:
          advance: pre-prod
      pre-prod:
        name: Pré produção
        agent: tech-lead
        prompt: Preparar ambiente pré produtivo para homologação
        change:
          advance: homologacao
      homologacao:
        name: Homologação
      documentacao:
        name: Documentação
        agent: product
        effort: low
        prompt: Atualizar README, documentações públicas e change files
        change:
          advance: publicacao
      publicacao:
        name: Publicação
        agent: devops
        prompt: Publicar em produção conforme runbook
        change:
          advance: otimizacao
      otimizacao:
        name: Otimização
        agent: optimizer
        gitevents: [merge]
        prompt: Analisar desempenho dos agentes e otimizar prompts
        change:
          advance: concluido
      concluido:
        name: Concluído
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      cancelado:
        name: Cancelado
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      encerrado:
        name: Encerrado
        archive: true

  story:
    name: Pipe - User Stories
    todo: backlog
    priority: 3
    flow: epic
    columns:
      backlog:
        name: Backlog
        change:
          advance: requisitos
          cancelar: cancelado
      requisitos:
        name: Requisitos
        agent: requirements
        gitevents: [create]
        prompt: Levantar requisitos e complementar documentações
        change:
          advance: validacao-negocial
      validacao-negocial:
        name: Validação Negocial
      arquitetura:
        name: Arquitetura
        agent: architecture
        effort: high
        prompt: Definir arquitetura da story
        change:
          advance: validacao-arquitetura
      validacao-arquitetura:
        name: Validação Arquitetural
      planejamento-tecnico:
        name: Planejamento Técnico
        agent: tech-lead
        prompt: Decompor a story em tarefas técnicas
        change:
          advance: aguardando-tasks
      aguardando-tasks:
        name: Aguardando Tasks
        change:
          advance: change-file
      change-file:
        name: Change File
        agent: tech-lead
        effort: low
        gitevents: [merge]
        prompt: Criar change file documentando alterações
        change:
          advance: concluido
      concluido:
        name: Concluído
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      cancelado:
        name: Cancelado
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      encerrado:
        name: Encerrado
        archive: true

  task:
    name: Pipe - Tasks
    todo: backlog
    priority: 2
    flow: feature
    columns:
      backlog:
        name: Backlog
        change:
          advance: planning-poker
          cancelar: cancelado
      planning-poker:
        name: Planning Poker
        agent: tech-lead
        prompt: Avaliar complexidade e adicionar tag /effort
        change:
          advance: casos-de-teste
      casos-de-teste:
        name: Casos de Teste
        agent: quality
        gitevents: [create]
        prompt: Escrever casos de teste baseados nos critérios de aceitação
        change:
          advance: desenvolvimento
      desenvolvimento:
        name: Desenvolvimento
        agent: engineering
        effort: high
        gitevents: [merge]
        prompt: Implementar a task seguindo TDD
        change:
          advance: code-review
      code-review:
        name: Code Review
      execucao-testes:
        name: Execução de Testes
        agent: quality
        prompt: Executar casos de teste e registrar resultados
        change:
          advance: concluido
          falha: desenvolvimento
      concluido:
        name: Concluído
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      cancelado:
        name: Cancelado
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      encerrado:
        name: Encerrado
        archive: true

  bug:
    name: Pipe - Bugs
    todo: backlog
    priority: 0
    flow: bugfix
    columns:
      backlog:
        name: Backlog
        change:
          advance: correcao
          cancelar: cancelado
      correcao:
        name: Correção
        agent: engineering
        gitevents: [create]
        prompt: Corrigir o bug reportado
        change:
          advance: reteste
      reteste:
        name: Reteste
        agent: quality
        gitevents: [merge]
        prompt: Reexecutar testes e validar correção
        change:
          advance: concluido
          falha: correcao
      concluido:
        name: Concluído
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      cancelado:
        name: Cancelado
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      encerrado:
        name: Encerrado
        archive: true

  debito:
    name: Pipe - Débitos
    todo: humano
    priority: 1
    flow: bugfix
    columns:
      humano:
        name: Humano
      product:
        name: Agente Product
        agent: product
        gitevents: [create, merge]
        prompt: Analisar solicitação e atualizar documentações
        change:
          advance: requirements
          concluido: concluido
          cancelar: cancelado
      requirements:
        name: Agente Requirements
        agent: requirements
        gitevents: [create, merge]
        prompt: Analisar solicitação e atualizar documentações
        change:
          advance: architecture
          concluido: concluido
          cancelar: cancelado
      architecture:
        name: Agente Architecture
        agent: architecture
        gitevents: [create, merge]
        prompt: Analisar solicitação e atualizar documentações
        change:
          advance: engineering
          concluido: concluido
          cancelar: cancelado
      engineering:
        name: Agente Engineering
        agent: engineering
        gitevents: [create, merge]
        prompt: Analisar solicitação e atualizar código
        change:
          advance: quality
          concluido: concluido
          cancelar: cancelado
      quality:
        name: Agente Quality
        agent: quality
        gitevents: [create, merge]
        prompt: Analisar solicitação e atualizar testes
        change:
          advance: concluido
          cancelar: cancelado
      concluido:
        name: Concluído
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      cancelado:
        name: Cancelado
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      encerrado:
        name: Encerrado
        archive: true

  incidente:
    name: Pipe - Incidentes
    todo: reportado
    priority: 0
    flow: hotfix
    columns:
      reportado:
        name: Reportado
        change:
          advance: registro
      registro:
        name: Registro
        agent: product
        gitevents: [create]
        prompt: Documentar incidente e colher dados com usuário
        change:
          advance: triagem
          cancelar: cancelado
      triagem:
        name: Triagem
        agent: tech-lead
        prompt: Confirmar problema, avaliar impacto e classificar severidade
        change:
          advance: analise-tecnica
          cancelar: cancelado
      analise-tecnica:
        name: Análise Técnica
        agent: engineering
        effort: high
        prompt: Investigar logs, métricas e identificar causa
        change:
          advance: decisao-tratamento
      decisao-tratamento:
        name: Decisão de Tratamento
        agent: tech-lead
        effort: high
        prompt: Definir caminho de tratamento do incidente
        change:
          advance: analise-relatorio
      analise-relatorio:
        name: Análise do Relatório
      execucao-tratamento:
        name: Execução de Tratamento
        agent: generic
        effort: low
        prompt: Executar ação proposta na documentação do incidente
        change:
          advance: planejamento-tecnico
          concluido: concluido
          cancelado: cancelado
      planejamento-tecnico:
        name: Planejamento Técnico
        agent: tech-lead
        effort: high
        prompt: Decompor solução em tarefas técnicas
        change:
          advance: aguardando-tasks
      aguardando-tasks:
        name: Aguardando Tasks
        change:
          advance: pre-prod
      pre-prod:
        name: Pré Produção
        agent: tech-lead
        prompt: Preparar ambiente pré produtivo para homologação
        change:
          advance: homologacao
      homologacao:
        name: Homologação
      documentacao:
        name: Documentação
        agent: product
        effort: low
        prompt: Atualizar README e documentações
        change:
          advance: publicacao
      publicacao:
        name: Publicação
        agent: devops
        prompt: Publicar em produção
        change:
          advance: concluido
      concluido:
        name: Concluído
        agent: generic
        prompt: Criar post mortem e remover bloqueios
        change:
          advance: encerrado
      cancelado:
        name: Cancelado
        agent: generic
        prompt: Remover bloqueios de issues dependentes
        change:
          advance: encerrado
      encerrado:
        name: Encerrado
        archive: true
