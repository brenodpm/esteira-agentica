pipe:
  sleeptime: 1800
  log:
    level: INFO
    ttl: 10
  agent:
    timeout: 1800
  github:
    start-throttle: 16    # intervalo inicial ao ligar (segundos)
    throttle: 2           # piso mínimo após regressão (segundos)
    max-throttle: 30      # teto antes de entrar em penalty (segundos)
    retry-after: 60       # espera padrão quando API retorna rate limit
    cooldown: 3600        # tempo sem rate limit para regredir 1 nível (1h)
    penalty:
      base: 3600          # duração inicial do penalty (1h)
      max: 86400          # duração máxima do penalty (24h)
      cooldown: 3600      # tempo sem penalty para regredir nível (1h)

git:
  repo: owner/repo
  flow:
    base: main
    cleanup: true

boards: {}
